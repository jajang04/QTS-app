<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Drop Shadow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="silkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" /> <!-- Mint -->
      <stop offset="50%" stop-color="#60A5FA" /> <!-- Blue -->
      <stop offset="100%" stop-color="#A78BFA" /> <!-- Violet -->
    </linearGradient>
  </defs>

  <!-- Obsidian Dark Background -->
  <rect width="512" height="512" rx="120" fill="#0A0A0A" />
  <rect width="512" height="512" rx="120" fill="url(#silkGradient)" opacity="0.05" />

  <!-- Abstract Audio Wave / Q Form -->
  <g transform="translate(256, 256) scale(1.1)" filter="url(#glow)">
    <!-- Inner Silk Orbit -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#silkGradient)" stroke-width="16" stroke-linecap="round" stroke-dasharray="450 600" transform="rotate(-45)" />
    
    <!-- Sound Waves inside Q -->
    <rect x="-35" y="-30" width="14" height="60" rx="7" fill="#2DD4BF" />
    <rect x="-5" y="-55" width="14" height="110" rx="7" fill="#60A5FA" />
    <rect x="25" y="-20" width="14" height="40" rx="7" fill="#A78BFA" />

    <!-- The Q Tail / Voice Wave extending outwards -->
    <path d="M 60,60 Q 110,110 140,80" fill="none" stroke="#A78BFA" stroke-width="16" stroke-linecap="round" />
    <circle cx="140" cy="80" r="12" fill="#2DD4BF" />
  </g>
</svg>